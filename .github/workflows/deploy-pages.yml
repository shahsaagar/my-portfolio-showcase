name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /my-portfolio-showcase/
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Generate static Pages shell
        run: |
          cat > /tmp/render-pages-shell.mjs <<'EOF'
          import { mkdir, writeFile } from "node:fs/promises";
          import { pathToFileURL } from "node:url";

          const server = await import(pathToFileURL(`${process.cwd()}/.output/server/index.mjs`).href);
          const context = { waitUntil() {}, passThroughOnException() {} };
          const response = await server.default.fetch(
            new Request("http://localhost/my-portfolio-showcase/"),
            {},
            context,
          );

          if (!response.ok) {
            throw new Error(`Failed to render static shell: ${response.status} ${await response.text()}`);
          }

          await mkdir(".output/public", { recursive: true });
          await writeFile(".output/public/index.html", await response.text());
          EOF
          bun /tmp/render-pages-shell.mjs
      - name: SPA fallback + .nojekyll
        run: |
          touch .output/public/.nojekyll
          cp .output/public/index.html .output/public/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
